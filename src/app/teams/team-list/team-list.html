<app-header></app-header>

<div class="layout-container">
  <app-sidebar [collapsed]="false"></app-sidebar>
  
  <div class="main-content">
    <app-spinner *ngIf="isLoading" [fullScreen]="false"></app-spinner>

    <div class="teams-container" *ngIf="!isLoading">
      <div class="page-header">
        <h1>Teams</h1>
        <button class="btn btn-primary" (click)="openCreateModal()">Create Team</button>
      </div>

      <div class="teams-grid">
        <div class="team-card" *ngFor="let team of teams" [routerLink]="['/teams', team.id]">
          <div class="team-icon">
            <i class="fa-solid fa-users"></i>
          </div>
          <div class="team-info">
            <h3>{{ team.name }}</h3>
            <p *ngIf="team.description">{{ team.description }}</p>
            <p *ngIf="!team.description" class="text-muted">No description</p>
          </div>
        </div>

        <div class="team-card empty" *ngIf="teams.length === 0" (click)="openCreateModal()">
          <p>You don't belong to any teams yet.</p>
          <span class="btn-link">Create a team</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Create Team Modal -->
<div class="modal-overlay" *ngIf="isCreateModalOpen" (click)="closeCreateModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>Create a team</h3>
      <button class="close-btn" (click)="closeCreateModal()"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Team name <span class="required">*</span></label>
        <input type="text" [(ngModel)]="newTeamName" class="form-control" placeholder="Taco's team" />
      </div>

      <div class="form-group">
        <label>Team description</label>
        <textarea [(ngModel)]="newTeamDesc" class="form-control" rows="4" placeholder="Get your members on board with a few words about your team."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary create-btn" 
              [disabled]="!newTeamName.trim() || isCreating"
              (click)="createTeam()">
        <span *ngIf="!isCreating">Continue</span>
        <app-spinner *ngIf="isCreating" [fullScreen]="false" message=""></app-spinner>
      </button>
    </div>
  </div>
</div>
