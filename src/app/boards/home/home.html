<app-header></app-header>

<div class="layout-container">
  <app-sidebar [collapsed]="isSidebarCollapsed"></app-sidebar>
  
  <div class="main-content">
    <app-spinner *ngIf="isLoading" [fullScreen]="false"></app-spinner>

    <div class="boards-container" *ngIf="!isLoading">
      <div class="boards-section">
        <h3 class="section-title">
          <i class="fa-regular fa-user section-icon"></i>
          Your workspaces
        </h3>
        
        <div class="boards-grid">
          <a *ngFor="let p of projects" 
             [routerLink]="['/boards', p.id]" 
             class="board-tile" 
             [style.background]="p.color || '#0052CC'">
            <div class="board-tile-overlay"></div>
            <div class="board-tile-title">{{ p.name }}</div>
          </a>

          <div class="board-tile create-board" (click)="openCreateModal()">
            <span>Create new board</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Create Board Modal -->
<div class="modal-overlay" *ngIf="isCreateModalOpen" (click)="closeCreateModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>Create board</h3>
      <button class="close-btn" (click)="closeCreateModal()"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-body">
      <div class="preview-area" [style.background]="newProjectColor">
        <img src="assets/board-preview.svg" alt="Preview" class="preview-img" *ngIf="false" />
      </div>

      <div class="form-group">
        <label>Background</label>
        <div class="color-picker">
          <div *ngFor="let color of presetColors" 
               class="color-option" 
               [style.background]="color"
               [class.selected]="newProjectColor === color"
               (click)="selectColor(color)">
            <i class="fa-solid fa-check" *ngIf="newProjectColor === color"></i>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label>Workspace</label>
        <select [(ngModel)]="newProjectTeamId" class="form-control">
          <option [ngValue]="null">No Workspace</option>
          <option *ngFor="let team of teams" [ngValue]="team.id">{{ team.name }}</option>
        </select>
        <span class="error-msg" style="color: var(--trello-text-subtle); font-size: 12px; font-weight: normal; margin-top: 4px; display: block;">Select a workspace to add its members to this board.</span>
      </div>

      <div class="form-group">
        <label>Board title <span class="required">*</span></label>
        <input type="text" [(ngModel)]="newProjectName" class="form-control" [class.is-invalid]="!newProjectName.trim()" />
        <span class="error-msg" *ngIf="!newProjectName.trim()">👋 Board title is required</span>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary create-btn" 
              [disabled]="!newProjectName.trim() || isCreating"
              (click)="createProject()">
        <span *ngIf="!isCreating">Create</span>
        <i class="fa-solid fa-spinner fa-spin" *ngIf="isCreating"></i>
      </button>
    </div>
  </div>
</div>
