<div class="auth-layout">
  <div class="auth-card">
    <div class="logo-container">
      <i class="fa-brands fa-trello logo-icon"></i>
      <h1>Trello</h1>
    </div>

    <h5 class="subtitle">Sign up for your account</h5>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="name-row">
        <div class="form-group half-width">
          <input 
            type="text" 
            formControlName="firstName" 
            placeholder="First Name" 
            class="form-control"
            [class.is-invalid]="registerForm.get('firstName')?.invalid && registerForm.get('firstName')?.touched"
          />
        </div>
        <div class="form-group half-width">
          <input 
            type="text" 
            formControlName="lastName" 
            placeholder="Last Name" 
            class="form-control"
            [class.is-invalid]="registerForm.get('lastName')?.invalid && registerForm.get('lastName')?.touched"
          />
        </div>
      </div>

      <div class="form-group">
        <input 
          type="email" 
          formControlName="email" 
          placeholder="Enter email address" 
          class="form-control"
          [class.is-invalid]="registerForm.get('email')?.invalid && registerForm.get('email')?.touched"
        />
        <div class="error-msg" *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
          Valid email is required
        </div>
      </div>

      <div class="form-group">
        <input 
          type="password" 
          formControlName="password" 
          placeholder="Create password" 
          class="form-control"
          [class.is-invalid]="registerForm.get('password')?.invalid && registerForm.get('password')?.touched"
        />
        <div class="error-msg" *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
          Password must be at least 6 characters
        </div>
      </div>

      <div class="error-alert" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>
      
      <div class="success-alert" *ngIf="successMessage">
        {{ successMessage }}
      </div>

      <button type="submit" class="btn-submit" [disabled]="isLoading || successMessage !== ''">
        <span *ngIf="!isLoading">Sign up</span>
        <app-spinner *ngIf="isLoading" [fullScreen]="false" message=""></app-spinner>
      </button>
    </form>

    <div class="auth-links">
      <a routerLink="/login">Already have an account? Log in</a>
    </div>
  </div>
</div>
