<div class="profile-layout">
  <app-spinner *ngIf="isLoading" [fullScreen]="true"></app-spinner>

  <div class="profile-container" *ngIf="!isLoading && user">
    <div class="profile-header">
      <div class="avatar-wrapper">
        <app-avatar [fullName]="user.firstName + ' ' + user.lastName" size="large"></app-avatar>
      </div>
      <div class="header-info">
        <h1>{{ user.firstName }} {{ user.lastName }}</h1>
        <p class="user-email">{{ user.email }}</p>
      </div>
    </div>

    <div class="profile-content">
      <div class="alert" [ngClass]="isError ? 'alert-error' : 'alert-success'" *ngIf="message">
        {{ message }}
      </div>

      <form [formGroup]="profileForm" (ngSubmit)="onSubmit()">
        <div class="form-section">
          <h3>Profile Settings</h3>
          
          <div class="form-row">
            <div class="form-group half-width">
              <label>First Name</label>
              <input type="text" formControlName="firstName" class="form-control" />
            </div>
            <div class="form-group half-width">
              <label>Last Name</label>
              <input type="text" formControlName="lastName" class="form-control" />
            </div>
          </div>

          <div class="form-group">
            <label>Email (Cannot be changed)</label>
            <input type="email" formControlName="email" class="form-control disabled" />
          </div>

          <div class="form-group">
            <label>Phone Number</label>
            <input type="text" formControlName="phoneNumber" class="form-control" />
          </div>

          <div class="form-group">
            <label>Bio</label>
            <textarea formControlName="bio" class="form-control" rows="4"></textarea>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary" [disabled]="profileForm.invalid || isSaving">
            <span *ngIf="!isSaving">Save Changes</span>
            <app-spinner *ngIf="isSaving" [fullScreen]="false" message=""></app-spinner>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
